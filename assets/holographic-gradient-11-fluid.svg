<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" overflow="hidden">
  <!-- Figma: Light Gradient 11  fluid object animation -->
  <defs>
    <style>
      .blob { transform-box: fill-box; transform-origin: center; will-change: transform; }
      .blob-green {
        animation: float-green 20s ease-in-out infinite;
      }
      .blob-orange {
        animation: float-orange 24s ease-in-out infinite;
      }
      .blob-blue {
        animation: float-blue 28s ease-in-out infinite;
      }
      .blob-core {
        animation: float-core 16s ease-in-out infinite;
      }
      @keyframes float-green {
        0%   { transform: translate(20px, -30px) scale(1) rotate(0deg); }
        35%  { transform: translate(-60px, 40px) scale(1.1) rotate(-5deg); }
        70%  { transform: translate(50px, 20px) scale(0.95) rotate(4deg); }
        100% { transform: translate(20px, -30px) scale(1) rotate(0deg); }
      }
      @keyframes float-orange {
        0%   { transform: translate(-30px, 10px) scale(1.02); }
        40%  { transform: translate(70px, -45px) scale(1.12); }
        75%  { transform: translate(-20px, 35px) scale(0.94); }
        100% { transform: translate(-30px, 10px) scale(1.02); }
      }
      @keyframes float-blue {
        0%   { transform: translate(0, 0) scale(1); }
        50%  { transform: translate(55px, -70px) scale(1.14); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes float-core {
        0%   { transform: translate(0, 0) scale(1); }
        25%  { transform: translate(-40px, -50px) scale(1.3); }
        50%  { transform: translate(45px, 30px) scale(0.88); }
        75%  { transform: translate(-25px, 40px) scale(1.18); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .blob { animation: none !important; }
      }
    </style>
    <filter id="blurGreen" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="280"/>
    </filter>
    <filter id="blurOrange" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="280"/>
    </filter>
    <filter id="blurBlue" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="300"/>
    </filter>
    <filter id="blurCore" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <clipPath id="frame">
      <rect width="1440" height="900"/>
    </clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="1440" height="900" fill="#FFFFFF"/>
    <!-- Green (Vector 8) -->
    <g class="blob blob-green" filter="url(#blurGreen)">
      <path d="M831 744.98C831 744.98 643.726 567.097 688.5 467.785C744.344 343.917 1029 502.669 1029 502.669C1029 502.669 1528.63 841.058 1587.75 925.025C1681.5 1058.18 1707.38 1191.3 1587.75 1251.36C1490.62 1300.12 831 744.98 831 744.98Z" fill="#00FF19"/>
    </g>
    <!-- Orange (Vector 5) -->
    <g class="blob blob-orange" filter="url(#blurOrange)">
      <path d="M1423.88 180.088C1616.51 214.168 1715.91 342.389 1843.13 491.041C2039.02 719.943 2159.28 1099.96 1875.38 1200.72C1616.53 1292.58 1607.58 778.392 1334.25 751.356C1236.98 741.734 1175.95 813.323 1085.25 776.862C970.827 730.865 922.936 632.637 917.25 509.42C911.393 382.501 961.829 289.726 1069.12 221.723C1184.66 148.494 1289.18 156.259 1423.88 180.088Z" fill="#FF7B00"/>
    </g>
    <!-- Blue (Vector 6) -->
    <g class="blob blob-blue" filter="url(#blurBlue)">
      <path d="M975.799 1560.58C1201.37 1777.07 1109.04 2180.58 1418.08 2227.91C1481.28 2237.59 1518.79 2238.73 1581.8 2227.91C1949 2164.89 1766.03 1597.7 1581.8 1273.85C1485.06 1103.81 1404.11 1026.82 1253.97 901.388C1119.14 788.741 1034.69 699.342 869.496 639.497C734.536 590.603 632.589 564.651 496.66 610.786C373.484 652.593 286.332 710.603 251.078 835.818C213.68 968.647 233.414 1061.14 304.23 1179.57C449.944 1423.28 770.946 1363.96 975.799 1560.58Z" fill="#00A3FF"/>
    </g>
    <!-- Soft cyan core (Ellipse 14) -->
    <g class="blob blob-core" filter="url(#blurCore)">
      <ellipse cx="1061.62" cy="899.143" rx="124.875" ry="124.906" fill="#ADE5FF"/>
    </g>
  </g>
</svg>
